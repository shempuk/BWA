name: slice

on:
  push:

jobs:
  expand:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        elastic: ["blind", "preceding", "scary", "cat", "admission"]
        mother: ["outlet", "pan", "beard", "accent"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar ul.jar
